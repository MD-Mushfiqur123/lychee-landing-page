name: Lychee Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binaries
        env:
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          
          # Linux amd64
          GOOS=linux GOARCH=amd64 go build -ldflags="-w -s" -o dist/lychee-linux-amd64
          
          # Linux arm64
          GOOS=linux GOARCH=arm64 go build -ldflags="-w -s" -o dist/lychee-linux-arm64
          
          # macOS amd64 (darwin)
          GOOS=darwin GOARCH=amd64 go build -ldflags="-w -s" -o dist/lychee-darwin-amd64
          
          # macOS arm64 (darwin)
          GOOS=darwin GOARCH=arm64 go build -ldflags="-w -s" -o dist/lychee-darwin-arm64
          
          # Windows amd64
          GOOS=windows GOARCH=amd64 go build -ldflags="-w -s" -o dist/lychee-windows-amd64.exe

      - name: Package binaries
        run: |
          cd dist
          tar -czf lychee-linux-amd64.tar.gz lychee-linux-amd64
          tar -czf lychee-linux-arm64.tar.gz lychee-linux-arm64
          tar -czf lychee-darwin-amd64.tar.gz lychee-darwin-amd64
          tar -czf lychee-darwin-arm64.tar.gz lychee-darwin-arm64
          zip lychee-windows-amd64.zip lychee-windows-amd64.exe
          rm lychee-linux-amd64 lychee-linux-arm64 lychee-darwin-amd64 lychee-darwin-arm64 lychee-windows-amd64.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/lychee-linux-amd64.tar.gz
            dist/lychee-linux-arm64.tar.gz
            dist/lychee-darwin-amd64.tar.gz
            dist/lychee-darwin-arm64.tar.gz
            dist/lychee-windows-amd64.zip
          draft: false
          prerelease: false
          generate_release_notes: true
