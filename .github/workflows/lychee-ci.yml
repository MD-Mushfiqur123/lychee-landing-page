name: Lychee CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Auto-update vulnerable dependencies ─────────────────────────
  autoupdate:
    name: Auto-update vulnerable dependencies
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Update packages
        run: |
          go get -u golang.org/x/image@latest golang.org/x/crypto@latest golang.org/x/net@latest golang.org/x/text@latest golang.org/x/sys@latest golang.org/x/tools@latest
          go mod tidy
      - name: Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add go.mod go.sum
          git diff-index --quiet HEAD || (git commit -m "chore: auto-update vulnerable dependencies" && git push origin HEAD:main)

  # ─── Go Unit Tests ───────────────────────────────────────────────
  test:
    name: Go Tests (${{ matrix.os }})
    needs: autoupdate
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Lychee-specific tests
        env:
          CGO_ENABLED: 0
        run: |
          go test -count=1 -timeout 120s -coverprofile=coverage.out ./api/... ./model/...
          go test -count=1 -v -coverprofile=server_coverage.out ./server/ -run "TestCompose|TestSchema|TestPromptCache|TestStructured|TestMemory|TestRouter|TestDashboard"

      - name: Show Coverage Summary
        run: |
          go tool cover -func=coverage.out
          go tool cover -func=server_coverage.out

      - name: Run Python SDK tests
        run: |
          cd sdk/python
          python -m unittest discover -s tests

      - name: Run JS SDK tests
        run: node --test sdk/js/tests/test_client.js

  # ─── Linting ─────────────────────────────────────────────────────
  lint:
    name: Lint
    needs: autoupdate
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: 0
      GOEXPERIMENT: synctest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m ./api/... ./model/... ./server/...

  # ─── Build Verification ──────────────────────────────────────────
  build:
    name: Build & Vet Packages
    needs: autoupdate
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: 0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Vet & Build Packages
        run: |
          go build ./api/...
          go build ./model/...
          go vet ./server/...

  # ─── Security Scan ───────────────────────────────────────────────
  security:
    name: Security Scan
    needs: autoupdate
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: 0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./api/... ./model/... ./server/...

  # ─── go mod tidy check ───────────────────────────────────────────
  mod-tidy:
    name: go mod tidy
    needs: autoupdate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go mod tidy -diff || (echo "Please run 'go mod tidy'" && exit 1)
