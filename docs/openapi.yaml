openapi: 3.1.0
info:
  title: Lychee API
  description: |
    Lychee is a universal local LLM runtime with multi-protocol API support.
    It extends Ollama with Anthropic API compatibility, Model Composer, Agent Sandbox,
    and an embedded Web Dashboard.
  version: 0.1.0-alpha
  license:
    name: MIT
    url: https://github.com/MD-Mushfiqur123/lychee/blob/main/LICENSE
  contact:
    name: MD-Mushfiqur123
    url: https://github.com/MD-Mushfiqur123/lychee

servers:
  - url: http://localhost:11434
    description: Local Lychee server (default)

tags:
  - name: compose
    description: Model Composer — chain multiple models in a pipeline
  - name: chat
    description: Native Lychee chat API
  - name: anthropic
    description: Anthropic Messages API compatibility layer
  - name: openai
    description: OpenAI API compatibility layer
  - name: models
    description: Model management
  - name: structured
    description: Structured Output API with auto-retry
  - name: conversations
    description: Conversation memory store CRUD operations
  - name: routes
    description: Virtual model router load balancing configurations

paths:
  /api/compose:
    post:
      tags: [compose]
      summary: Execute a multi-model composition chain
      description: |
        Chains multiple local models in a pipeline. Supports streaming, parallel
        branch execution, per-step timeouts, and automatic fallback model retry.

        Template variables:
        - `{{input}}` — the original user input
        - `{{step[N].output}}` — output from step N (0-indexed)
        - `{{step[N].parallel[M].output}}` — output from parallel branch M of step N
      operationId: composeChain
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComposeRequest'
      responses:
        '200':
          description: Chain result (or SSE stream if stream=true)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComposeResponse'
            text/event-stream:
              schema:
                $ref: '#/components/schemas/ComposeEvent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/messages:
    post:
      tags: [anthropic]
      summary: Anthropic Messages API (drop-in compatible)
      operationId: anthropicMessages
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [model, messages, max_tokens]
              properties:
                model:
                  type: string
                  example: "gemma3"
                messages:
                  type: array
                  items:
                    type: object
                    properties:
                      role:
                        type: string
                        enum: [user, assistant]
                      content:
                        type: string
                max_tokens:
                  type: integer
                stream:
                  type: boolean
      responses:
        '200':
          description: Anthropic-format message response

  /api/chat:
    post:
      tags: [chat]
      summary: Native multi-turn chat
      operationId: chat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [model, messages]
              properties:
                model:
                  type: string
                messages:
                  type: array
                  items:
                    type: object
                stream:
                  type: boolean
                  default: true
      responses:
        '200':
          description: Chat response

  /v1/chat/completions:
    post:
      tags: [openai]
      summary: OpenAI Chat Completions (drop-in compatible)
      operationId: openaiChatCompletions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [model, messages]
              properties:
                model:
                  type: string
                messages:
                  type: array
                  items:
                    type: object
                stream:
                  type: boolean
      responses:
        '200':
          description: OpenAI-format chat completion

  /v1/responses:
    post:
      tags: [openai]
      summary: OpenAI Responses API with JSON Schema validation
      operationId: openaiResponses
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [model, prompt]
              properties:
                model:
                  type: string
                prompt:
                  type: string
                response_format:
                  type: object
      responses:
        '200':
          description: Structured JSON response

  /api/tags:
    get:
      tags: [models]
      summary: List all locally available models
      operationId: listModels
      responses:
        '200':
          description: List of models

  /api/structured:
    post:
      tags: [structured]
      summary: Generate schema-conforming JSON with auto-retry
      operationId: generateStructured
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [model, prompt]
              properties:
                model:
                  type: string
                prompt:
                  type: string
                schema:
                  type: object
                max_retries:
                  type: integer
                  default: 3
                options:
                  type: object
      responses:
        '200':
          description: Structured generation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  output:
                    type: string
                  valid:
                    type: boolean
                  attempts:
                    type: integer
                  errors:
                    type: array
                    items:
                      type: string

  /api/conversations:
    get:
      tags: [conversations]
      summary: List summaries of all saved conversations
      operationId: listConversations
      responses:
        '200':
          description: List of conversation summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ConversationSummary'
    post:
      tags: [conversations]
      summary: Create a new conversation
      operationId: createConversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [model, messages]
              properties:
                model:
                  type: string
                messages:
                  type: array
                  items:
                    $ref: '#/components/schemas/ChatMessage'
      responses:
        '201':
          description: Conversation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conversation'

  /api/conversations/{id}:
    get:
      tags: [conversations]
      summary: Retrieve conversation details and message history
      operationId: getConversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Full conversation details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conversation'
    delete:
      tags: [conversations]
      summary: Delete a conversation
      operationId: deleteConversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Conversation deleted

  /api/routes:
    get:
      tags: [routes]
      summary: List all registered virtual routes
      operationId: listRoutes
      responses:
        '200':
          description: List of routes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ModelRoute'
    post:
      tags: [routes]
      summary: Create or update a virtual model route
      operationId: createRoute
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModelRoute'
      responses:
        '200':
          description: Route created or updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelRoute'

  /api/routes/{name}:
    delete:
      tags: [routes]
      summary: Delete a virtual model route
      operationId: deleteRoute
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Route deleted

  /api/routes/{name}/status:
    get:
      tags: [routes]
      summary: Query the health and status of a virtual model route
      operationId: getRouteStatus
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Route status details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RouteStatusResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

components:
  schemas:
    ComposeStep:
      type: object
      required: [model, prompt]
      properties:
        model:
          type: string
          example: "gemma3"
        prompt:
          type: string
          example: "Summarize: {{input}}"
        options:
          type: object
          additionalProperties: true
        timeout_sec:
          type: integer
          example: 30
        fallback_model:
          type: string
          example: "llama3.2"
        parallel:
          type: array
          items:
            $ref: '#/components/schemas/ComposeStep'

    ComposeRequest:
      type: object
      required: [input, steps]
      properties:
        input:
          type: string
          example: "Explain quantum entanglement simply."
        steps:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/ComposeStep'
        stream:
          type: boolean
          default: false

    StepResult:
      type: object
      properties:
        model:
          type: string
        output:
          type: string
        parallel_results:
          type: array
          items:
            $ref: '#/components/schemas/StepResult'

    ComposeResponse:
      type: object
      properties:
        output:
          type: string
        results:
          type: array
          items:
            $ref: '#/components/schemas/StepResult'

    ComposeEvent:
      type: object
      properties:
        event:
          type: string
          enum: [step_start, step_progress, step_complete, step_fallback, parallel_progress, complete, error]
        index:
          type: integer
        model:
          type: string
        text:
          type: string
        output:
          type: string
        result:
          $ref: '#/components/schemas/ComposeResponse'

    Error:
      type: object
      properties:
        error:
          type: string

    ChatMessage:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [system, user, assistant, tool]
          example: "user"
        content:
          type: string
          example: "What is quantum computing?"
        thinking:
          type: string
          example: "Thinking process..."
        images:
          type: array
          items:
            type: string
            format: byte
        tool_calls:
          type: array
          items:
            type: object
        tool_name:
          type: string
        tool_call_id:
          type: string

    ConversationSummary:
      type: object
      required: [id, model, title, messages, created_at, updated_at]
      properties:
        id:
          type: string
          example: "conv-123"
        model:
          type: string
          example: "gemma3"
        title:
          type: string
          example: "What is quantum computing?"
        messages:
          type: integer
          example: 2
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Conversation:
      type: object
      required: [id, model, messages, created_at, updated_at]
      properties:
        id:
          type: string
          example: "conv-123"
        model:
          type: string
          example: "gemma3"
        messages:
          type: array
          items:
            $ref: '#/components/schemas/ChatMessage'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ModelEndpoint:
      type: object
      required: [host]
      properties:
        host:
          type: string
          example: "http://localhost:11434"
        model:
          type: string
          example: "gemma3"
        weight:
          type: integer
          example: 1

    ModelRoute:
      type: object
      required: [name, endpoints, strategy]
      properties:
        name:
          type: string
          example: "fast"
        endpoints:
          type: array
          items:
            $ref: '#/components/schemas/ModelEndpoint'
        strategy:
          type: string
          enum: [round_robin, random, least_loaded, weighted_round_robin]
          example: "round_robin"

    ModelEndpointStatus:
      type: object
      required: [host, healthy, active_requests]
      properties:
        host:
          type: string
          example: "http://localhost:11434"
        model:
          type: string
          example: "gemma3"
        healthy:
          type: boolean
          example: true
        active_requests:
          type: integer
          example: 0
        last_check:
          type: string
          format: date-time
        last_error:
          type: string
          example: "connection refused"

    RouteStatusResponse:
      type: object
      required: [name, strategy, endpoints]
      properties:
        name:
          type: string
          example: "fast"
        strategy:
          type: string
          example: "round_robin"
        endpoints:
          type: array
          items:
            $ref: '#/components/schemas/ModelEndpointStatus'

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InternalError:
      description: Server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
